<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>こころBot - 誰にも言えないことを、そのまま話していい場所</title>
  <meta
    name="description"
    content="今、ちょっとしんどいなって思いませんか？こころBotは、誰にも言えないことをそのまま話していい場所です。"
  />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #f7f5f3;
      --card-bg: #ffffff;
      --text-primary: #2d2d2d;
      --text-secondary: #888888;
      --text-muted: #aaaaaa;
      --logo-bg: #f8c8d4;
      --cta-green: #6cc655;
      --cta-green-hover: #5ab847;
      --cta-shadow: rgba(108, 198, 85, 0.3);
      --card-shadow: 0 2px 40px rgba(0, 0, 0, 0.06);
      --card-radius: 24px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .lp-card {
      background: var(--card-bg);
      border-radius: var(--card-radius);
      box-shadow: var(--card-shadow);
      width: 100%;
      max-width: 440px;
      padding: 48px 32px 40px;
      text-align: center;
      animation: cardIn 0.6s ease-out both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-wrap {
      margin: 0 auto 16px;
      width: 120px;
      height: 120px;
      animation: fadeIn 0.8s ease-out 0.2s both;
    }

    .logo-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 16px;
      display: block;
    }

    .brand-name {
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 0.04em;
      margin-bottom: 36px;
      animation: fadeIn 0.8s ease-out 0.3s both;
    }

    .headline {
      font-size: 1.35rem;
      font-weight: 500;
      line-height: 1.75;
      margin-bottom: 16px;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    .sub-copy {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.75;
      color: var(--text-primary);
      margin-bottom: 36px;
      animation: fadeIn 0.8s ease-out 0.5s both;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      max-width: 300px;
      padding: 16px 32px;
      background: var(--cta-green);
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 4px 16px var(--cta-shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      animation: fadeIn 0.8s ease-out 0.6s both;
      position: relative;
      overflow: hidden;
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 50%);
      border-radius: inherit;
      pointer-events: none;
    }

    .cta-btn:hover {
      background: var(--cta-green-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px var(--cta-shadow);
    }

    .cta-btn:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px var(--cta-shadow);
    }

    .cta-btn svg {
      flex-shrink: 0;
    }

    .footer-note {
      margin-top: 20px;
      font-size: 0.8rem;
      line-height: 1.7;
      color: var(--text-muted);
      animation: fadeIn 0.8s ease-out 0.7s both;
    }

    .trust-badges {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
      animation: fadeIn 0.8s ease-out 0.8s both;
      flex-wrap: wrap;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .badge-icon {
      width: 16px;
      height: 16px;
      opacity: 0.5;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (min-width: 768px) {
      body {
        padding: 40px;
      }

      .lp-card {
        max-width: 520px;
        padding: 64px 56px 52px;
        border-radius: 32px;
      }

      .logo-wrap {
        width: 140px;
        height: 140px;
        margin-bottom: 20px;
      }

      .brand-name {
        font-size: 1.35rem;
        margin-bottom: 44px;
      }

      .headline {
        font-size: 1.55rem;
      }

      .sub-copy {
        font-size: 1.1rem;
        margin-bottom: 44px;
      }

      .cta-btn {
        font-size: 1.15rem;
        padding: 18px 40px;
      }
    }

    @media (max-width: 374px) {
      .lp-card {
        padding: 36px 20px 32px;
      }

      .logo-wrap {
        width: 100px;
        height: 100px;
      }

      .headline {
        font-size: 1.15rem;
      }

      .sub-copy {
        font-size: 0.9rem;
      }

      .cta-btn {
        font-size: 1rem;
        padding: 14px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="lp-card">
    <div class="logo-wrap">
      <img src="logo.png" alt="こころBot" class="logo-img" />
    </div>

    <p class="brand-name">こころBot</p>

    <h1 class="headline">
      今、ちょっとしんどいなって<br />
      思っていませんか？
    </h1>

    <p class="sub-copy">
      ここは、誰にも言えないことを<br />
      そのまま話していい場所です
    </p>

    <a
      href="https://kokoro-bot-mvp2.vercel.app"
      class="cta-btn"
      role="button"
      target="_blank"
      rel="noopener noreferrer"
    >
      無料で話してみる
    </a>

    <p class="footer-note">
      匿名で使えて、すぐに始められます
    </p>

    <div class="trust-badges">
      <span class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        完全匿名
      </span>

      <span class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        安心・安全
      </span>

      <span class="badge">
        <svg class="badge-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M8 12l2 2 4-4"></path>
        </svg>
        無料
      </span>
    </div>
  </main>
</body>
</html>
